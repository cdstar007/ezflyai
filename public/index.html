<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>台股每日股市報告</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Daily Market Report</p>
          <h1 id="page-title">台股每日股市報告</h1>
          <p class="subtle">每日只生成一次；已生成後會直接讀取保存內容。</p>
        </div>
      </section>

      <section id="report-error" class="error" hidden></section>
      <section class="report-shell">
        <div class="report-meta">
          <span id="report-status">尚未載入</span>
          <span id="report-generated-at">--</span>
        </div>
        <iframe
          id="report-frame"
          title="今日股市報告"
          sandbox=""
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
